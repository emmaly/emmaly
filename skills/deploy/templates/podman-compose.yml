services:
  app:
    container_name: ${PROJECT_NAME}
    image: localhost/${PROJECT_NAME}:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - internal
    # Uncomment for persistent storage:
    # volumes:
    #   - app-data:/data

  # Companion cloudflared container — tunnels traffic directly to app
  # over the shared internal network. No external network needed; this
  # container IS the tunnel endpoint, not a consumer of a shared one.
  cloudflared:
    image: docker.io/cloudflare/cloudflared:latest
    command: tunnel run --token ${CLOUDFLARED_TOKEN}
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge
  # If this project does NOT bundle its own cloudflared container and
  # instead relies on a shared cloudflared instance on the host, remove
  # the cloudflared service above and add the app to an external network:
  #
  #   cloudflared:            (for public access via shared tunnel)
  #     external: true
  #   caddy:                  (for private access via shared reverse proxy)
  #     external: true
  #
  # Never connect a container to both cloudflared and caddy.

# Uncomment for persistent storage:
# volumes:
#   app-data:
